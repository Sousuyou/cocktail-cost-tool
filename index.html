<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f1ec" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14130f" media="(prefers-color-scheme: dark)" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; worker-src 'self'; manifest-src 'self'"
    />
    <title>Bar Soutsu カクテル原価計算ツール</title>

    <!-- SNS・チャットでURLを共有したときの見栄え（OGP / Twitter Card） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bar Soutsu" />
    <meta property="og:title" content="カクテル原価計算ツール｜Bar Soutsu" />
    <meta property="og:description" content="材料原価・合計原価・原価率、目標原価率からの推奨販売価格をその場で算出。Bar Soutsuの社内ツールです。" />
    <meta property="og:url" content="https://sousuyou.github.io/cocktail-cost-tool/" />
    <meta property="og:image" content="https://sousuyou.github.io/cocktail-cost-tool/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://sousuyou.github.io/cocktail-cost-tool/assets/og-image.png" />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://sousuyou.github.io/top/theme.css" />
  </head>
  <body class="has-nav">
    <!-- 共通ナビ：中身は nav.js が自動生成（JS無効時はTOPリンクだけ残る） -->
    <nav class="site-nav" id="site-nav">
      <a class="site-nav-link" href="https://sousuyou.github.io/top/">TOP</a>
    </nav>
    <script src="https://sousuyou.github.io/top/nav.js" defer></script>
    <main class="app-shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="brand-mark">Bar Soutsu</p>
          <p class="eyebrow">Laboratory Cost Sheet / Cocktail Production</p>
          <h1 id="page-title">カクテル原価計算ツール</h1>
          <p class="lead">材料ごとの原価、合計原価、原価率、目標原価率からの推奨販売価格をその場で確認できます。オリジナルカクテルを制作する際の原価計算などにご使用ください。</p>
        </div>
        <div class="hero-panel" aria-label="計算サマリー">
          <span>合計原価</span>
          <strong id="total-cost">¥0</strong>
          <small>1杯あたり</small>
        </div>
      </section>

      <section class="controls-band" aria-label="販売条件">
        <label>
          <span>販売価格</span>
          <input id="sale-price" type="number" min="0" step="1" inputmode="decimal" value="1300" placeholder="例: 1300" />
        </label>
        <label>
          <span>目標原価率</span>
          <div class="input-suffix">
            <input id="target-rate" type="number" min="0" step="0.1" inputmode="decimal" value="20" placeholder="例: 20" />
            <span>%</span>
          </div>
        </label>
        <div class="metric">
          <span>原価率</span>
          <strong id="cost-rate">-</strong>
        </div>
        <div class="metric">
          <span>推奨販売価格</span>
          <strong id="recommended-price">-</strong>
          <span class="price-rounded" id="recommended-price-rounded">-</span>
          <span class="price-note">100円単位で切り上げた推奨額です</span>
        </div>
      </section>

      <section class="toolbar" aria-label="操作">
        <button id="add-row" type="button">材料を追加</button>
        <button id="download-csv" type="button" class="secondary">CSV保存</button>
        <label class="file-button">
          CSV読み込み
          <input id="csv-file" type="file" accept=".csv,text/csv" />
        </label>
      </section>

      <section class="ingredients-section" aria-label="材料一覧">
        <div class="table-head" aria-hidden="true">
          <span>材料名</span>
          <span>ボトル価格</span>
          <span>容量ml</span>
          <span>使用量ml</span>
          <span>原価</span>
          <span></span>
        </div>
        <div id="ingredient-list" class="ingredient-list"></div>
      </section>

      <!-- CSV読込エラーなどのお知らせ（普段は非表示） -->
      <div id="app-message" class="app-message" role="status" aria-live="polite" hidden></div>

      <!-- レシピの保存・呼び出し -->
      <section class="recipe-band" aria-label="レシピの保存と呼び出し">
        <span class="recipe-title">レシピを保存・呼び出し</span>
        <div class="recipe-save">
          <input id="recipe-name" type="text" placeholder="レシピ名を入力（例: ジントニック）" />
          <button id="save-recipe" type="button">名前を付けて保存</button>
        </div>
        <span class="recipe-saved-help">保存したレシピ</span>
        <div id="recipe-list" class="recipe-list"></div>
      </section>
    </main>

    <template id="ingredient-row-template">
      <article class="ingredient-row">
        <label>
          <span>材料名</span>
          <input class="name-input" type="text" placeholder="例: ドライジン" />
        </label>
        <label>
          <span>ボトル価格</span>
          <input class="price-input" type="number" min="0" step="1" inputmode="decimal" placeholder="例: 3200" />
        </label>
        <label>
          <span>容量ml</span>
          <input class="volume-input" type="number" min="0" step="1" inputmode="decimal" placeholder="例: 700" />
        </label>
        <label>
          <span>使用量ml</span>
          <input class="used-input" type="number" min="0" step="0.1" inputmode="decimal" placeholder="例: 45" />
        </label>
        <div class="row-cost">
          <span>原価</span>
          <strong>¥0</strong>
        </div>
        <button class="remove-row" type="button" aria-label="材料を削除">削除</button>
        <p class="row-warning">使用量がボトル容量を超えています。容量と使用量をご確認ください。</p>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
