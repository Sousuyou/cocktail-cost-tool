<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15120f" />
    <title>カクテル原価計算ツール</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Bar Cost Calculator</p>
          <h1 id="page-title">カクテル原価計算ツール</h1>
          <p class="lead">材料ごとの原価、合計原価、原価率、目標原価率からの推奨販売価格をその場で確認できます。</p>
        </div>
        <div class="hero-panel" aria-label="計算サマリー">
          <span>合計原価</span>
          <strong id="total-cost">¥0</strong>
          <small>1杯あたり</small>
        </div>
      </section>

      <section class="controls-band" aria-label="販売条件">
        <label>
          <span>販売価格</span>
          <input id="sale-price" type="number" min="0" step="1" inputmode="decimal" placeholder="例: 1200" />
        </label>
        <label>
          <span>目標原価率</span>
          <div class="input-suffix">
            <input id="target-rate" type="number" min="0" step="0.1" inputmode="decimal" placeholder="例: 25" />
            <span>%</span>
          </div>
        </label>
        <div class="metric">
          <span>原価率</span>
          <strong id="cost-rate">-</strong>
        </div>
        <div class="metric">
          <span>推奨販売価格</span>
          <strong id="recommended-price">-</strong>
        </div>
      </section>

      <section class="toolbar" aria-label="操作">
        <button id="add-row" type="button">材料を追加</button>
        <button id="download-csv" type="button" class="secondary">CSV保存</button>
        <label class="file-button">
          CSV読み込み
          <input id="csv-file" type="file" accept=".csv,text/csv" />
        </label>
      </section>

      <section class="ingredients-section" aria-label="材料一覧">
        <div class="table-head" aria-hidden="true">
          <span>材料名</span>
          <span>ボトル価格</span>
          <span>容量ml</span>
          <span>使用量ml</span>
          <span>原価</span>
          <span></span>
        </div>
        <div id="ingredient-list" class="ingredient-list"></div>
      </section>
    </main>

    <template id="ingredient-row-template">
      <article class="ingredient-row">
        <label>
          <span>材料名</span>
          <input class="name-input" type="text" placeholder="例: ドライジン" />
        </label>
        <label>
          <span>ボトル価格</span>
          <input class="price-input" type="number" min="0" step="1" inputmode="decimal" placeholder="例: 3200" />
        </label>
        <label>
          <span>容量ml</span>
          <input class="volume-input" type="number" min="0" step="1" inputmode="decimal" placeholder="例: 700" />
        </label>
        <label>
          <span>使用量ml</span>
          <input class="used-input" type="number" min="0" step="0.1" inputmode="decimal" placeholder="例: 45" />
        </label>
        <div class="row-cost">
          <span>原価</span>
          <strong>¥0</strong>
        </div>
        <button class="remove-row" type="button" aria-label="材料を削除">削除</button>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
